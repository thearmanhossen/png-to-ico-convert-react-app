<!DOCTYPE html>
<html lang="en" data-theme-key="png-to-ico-theme">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNG to ICO Converter</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
          },
        },
      };
    </script>
    <script>
      (() => {
        try {
          const storageKey = document.documentElement.dataset.themeKey || 'theme';
          const storedTheme = localStorage.getItem(storageKey);
          const theme =
            storedTheme === 'dark' || storedTheme === 'light'
              ? storedTheme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (error) {
          console.error('Theme initialization failed', error);
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased">
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
